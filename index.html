<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 智慧圖形辨識 - $1 Recognizer 版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #121212; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #input_video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); opacity: 0.1; }
        canvas { position: absolute; top: 0; left: 0; z-index: 100; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 200; background: rgba(30, 30, 30, 0.9); padding: 20px; border-radius: 12px; color: white; border: 1px solid #00ffcc; width: 250px; }
        #res { font-size: 28px; color: #00ffcc; font-weight: bold; display: block; margin: 10px 0; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 10px; }
        #dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .hint { font-size: 12px; color: #888; line-height: 1.5; border-top: 1px solid #444; pt: 10px; }
    </style>
</head>
<body>
    <video id="input_video" autoplay playsinline></video>
    <div class="ui">
        <div class="status"><div id="dot"></div><span id="state">正在啟動相機...</span></div>
        辨識結果：<br>
        <span id="res">等待繪製</span>
        <div class="hint">
            1. 伸出<b>食指</b>開始繪圖<br>
            2. 收回手指進行辨識<br>
            3. 支持：圓、方、三角、星、愛心
        </div>
    </div>

<script>
// --- $1 Recognizer 數學類別 ---
class DollarRecognizer {
    constructor() {
        this.templates = [];
    }

    addTemplate(name, points) {
        this.templates.push({ name: name, points: this.preprocess(points) });
    }

    preprocess(points) {
        points = this.resample(points, 64);
        points = this.rotateToZero(points);
        points = this.scaleTo(points, 250);
        points = this.translateToOrigin(points);
        return points;
    }

    recognize(points) {
        if (points.length < 10) return { name: "太短了", score: 0 };
        let p = this.preprocess(points);
        let bestDist = Infinity;
        let bestIdx = -1;

        for (let i = 0; i < this.templates.length; i++) {
            let d = this.pathDistance(p, this.templates[i].points);
            if (d < bestDist) {
                bestDist = d;
                bestIdx = i;
            }
        }
        
        let score = 1.0 - (bestDist / (0.5 * Math.sqrt(250*250 + 250*250)));
        return bestIdx === -1 ? { name: "未知", score: 0 } : { name: this.templates[bestIdx].name, score: score };
    }

    resample(points, n) {
        let I = this.pathLength(points) / (n - 1);
        let D = 0;
        let newPoints = [{x: points[0].x, y: points[0].y}];
        for (let i = 1; i < points.length; i++) {
            let d = dist(points[i-1].x, points[i-1].y, points[i].x, points[i].y);
            if (D + d >= I) {
                let qx = points[i-1].x + ((I - D) / d) * (points[i].x - points[i-1].x);
                let qy = points[i-1].y + ((I - D) / d) * (points[i].y - points[i-1].y);
                newPoints.push({x: qx, y: qy});
                points.splice(i, 0, {x: qx, y: qy});
                D = 0;
            } else D += d;
        }
        if (newPoints.length == n - 1) newPoints.push({x: points[points.length-1].x, y: points[points.length-1].y});
        return newPoints;
    }

    rotateToZero(points) {
        let c = this.centroid(points);
        let theta = Math.atan2(c.y - points[0].y, c.x - points[0].x);
        return this.rotateBy(points, -theta);
    }

    scaleTo(points, size) {
        let b = this.boundingBox(points);
        return points.map(p => ({
            x: p.x * (size / b.width),
            y: p.y * (size / b.height)
        }));
    }

    translateToOrigin(points) {
        let c = this.centroid(points);
        return points.map(p => ({ x: p.x - c.x, y: p.y - c.y }));
    }

    pathLength(pts) {
        let d = 0;
        for (let i = 1; i < pts.length; i++) d += dist(pts[i-1].x, pts[i-1].y, pts[i].x, pts[i].y);
        return d;
    }

    pathDistance(pts1, pts2) {
        let d = 0;
        for (let i = 0; i < pts1.length; i++) d += dist(pts1[i].x, pts1[i].y, pts2[i].x, pts2[i].y);
        return d / pts1.length;
    }

    centroid(pts) {
        let x = pts.reduce((s, p) => s + p.x, 0) / pts.length;
        let y = pts.reduce((s, p) => s + p.y, 0) / pts.length;
        return { x, y };
    }

    boundingBox(pts) {
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        pts.forEach(p => {
            minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
            minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
        });
        return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    rotateBy(pts, ang) {
        let c = this.centroid(pts);
        let cos = Math.cos(ang), sin = Math.sin(ang);
        return pts.map(p => ({
            x: (p.x - c.x) * cos - (p.y - c.y) * sin + c.x,
            y: (p.x - c.x) * sin + (p.y - c.y) * cos + c.y
        }));
    }
}

// --- P5.js 邏輯 ---
let hands, pg, path = [], handResults = null, isDrawing = false, recognizer;
const videoElement = document.getElementById('input_video');

function setup() {
    createCanvas(windowWidth, windowHeight);
    pg = createGraphics(windowWidth, windowHeight);
    pg.stroke(0, 255, 204);
    pg.strokeWeight(6);
    pg.noFill();

    recognizer = new DollarRecognizer();
    setupTemplates();

    hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280, height: 720
    });
    camera.start().then(() => {
        document.getElementById('state').innerText = "相機已就緒";
        document.getElementById('dot').style.background = "#00ffcc";
    });
}

function onResults(results) {
    handResults = results.multiHandLandmarks;
}

function draw() {
    clear();
    image(pg, 0, 0);

    if (handResults && handResults.length > 0) {
        let landmarks = handResults[0];
        let tip = landmarks[8]; // 食指指尖
        let x = (1 - tip.x) * width;
        let y = tip.y * height;

        // 手勢判斷：食指伸出且中指收起
        let isPointing = landmarks[8].y < landmarks[6].y && landmarks[12].y > landmarks[10].y;

        if (isPointing) {
            if (!isDrawing) {
                path = [];
                pg.clear();
                isDrawing = true;
            }
            path.push({ x, y });
            if (path.length > 1) {
                let p = path[path.length - 2];
                pg.line(p.x, p.y, x, y);
            }
            fill(0, 255, 204);
            noStroke();
            ellipse(x, y, 15, 15);
        } else {
            if (isDrawing && path.length > 10) {
                analyzeDrawing(path);
            }
            isDrawing = false;
            fill(255, 100, 100, 150);
            noStroke();
            ellipse(x, y, 10, 10);
        }
    }
}

function analyzeDrawing(pts) {
    let result = recognizer.recognize(pts);
    if (result.score > 0.6) {
        document.getElementById('res').innerText = `${result.name} (${Math.round(result.score*100)}%)`;
    } else {
        document.getElementById('res').innerText = "🤔 辨識不清";
    }
}

// 載入預設模板：這些是手動定義的標準路徑 
function setupTemplates() {
    recognizer.addTemplate("⚪ 圓形", [{x:150,y:50},{x:200,y:60},{x:240,y:100},{x:250,y:150},{x:240,y:200},{x:200,y:240},{x:150,y:250},{x:100,y:240},{x:60,y:200},{x:50,y:150},{x:60,y:100},{x:100,y:60},{x:150,y:50}]);
    recognizer.addTemplate("⬜ 正方形", [{x:50,y:50},{x:250,y:50},{x:250,y:250},{x:50,y:250},{x:50,y:50}]);
    recognizer.addTemplate("🔺 三角形", [{x:150,y:50},{x:250,y:250},{x:50,y:250},{x:150,y:50}]);
    recognizer.addTemplate("⭐ 星星", [{x:150,y:20},{x:185,y:120},{x:280,y:120},{x:200,y:180},{x:230,y:280},{x:150,y:210},{x:70,y:280},{x:100,y:180},{x:20,y:120},{x:115,y:120},{x:150,y:20}]);
    recognizer.addTemplate("❤️ 愛心", [{x:150,y:100},{x:200,y:50},{x:250,y:100},{x:250,y:150},{x:150,y:250},{x:50,y:150},{x:50,y:100},{x:100,y:50},{x:150,y:100}]);
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</body>
</html>
