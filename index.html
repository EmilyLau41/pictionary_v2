<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幾何辨識 - 修正繪圖版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #input_video { 
            position: absolute; width: 100vw; height: 100vh; 
            object-fit: cover; transform: scaleX(-1); opacity: 0.3; 
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 100; }
        .ui {
            position: absolute; top: 20px; left: 20px; z-index: 200;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px;
            border-left: 5px solid #00ffcc; color: white;
        }
        #status_indicator { width: 15px; height: 15px; border-radius: 50%; display: inline-block; background: red; margin-right: 5px; }
    </style>
</head>
<body>
    <video id="input_video" autoplay playsinline></video>
    <div class="ui">
        <div id="res" style="font-size: 24px; font-weight: bold; color: #00ffcc;">等待擷取螢幕...</div>
        <div style="margin: 10px 0;">
            <span id="status_indicator"></span>
            <span id="state_text">未偵測到手部</span>
        </div>
        <button onclick="startCapture()" style="padding: 10px; cursor: pointer;">1. 點擊開始擷取</button>
        <p style="font-size: 12px; color: #aaa;">提示：伸出食指（其他手指握拳）即可畫畫</p>
    </div>

<script>
    let hands, pg, path = [], handResults = null, isDrawing = false;
    const videoElement = document.getElementById('input_video');

    function setup() {
        createCanvas(windowWidth, windowHeight);
        pg = createGraphics(windowWidth, windowHeight);
        pg.stroke(0, 255, 204);
        pg.strokeWeight(10);
        
        hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(r => handResults = r.multiHandLandmarks);
    }

    async function startCapture() {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        videoElement.srcObject = stream;
        document.getElementById('res').innerText = "請分享包含 WebCam 的分頁";
        
        const loop = async () => {
            if (!videoElement.paused) await hands.send({ image: videoElement });
            requestAnimationFrame(loop);
        };
        loop();
    }

    function draw() {
        clear();
        image(pg, 0, 0);

        if (handResults && handResults.length > 0) {
            let pts = handResults[0];
            let x = (1 - pts[8].x) * width; // Mirror X
            let y = pts[8].y * height;

            // --- 簡化辨識邏輯：食指伸直且中指彎曲 ---
            // 比較指尖與指節的 Y 座標
            let indexExtended = pts[8].y < pts[6].y;
            let middleCurled = pts[12].y > pts[10].y;
            let shouldDraw = indexExtended && middleCurled;

            // 更新 UI 狀態
            const indicator = document.getElementById('status_indicator');
            const stateText = document.getElementById('state_text');
            
            if (shouldDraw) {
                indicator.style.background = "#00ffcc";
                stateText.innerText = "正在畫畫...";
                
                if (!isDrawing) {
                    path = [];
                    pg.clear();
                    isDrawing = true;
                }
                path.push({x, y});
                if (path.length > 1) {
                    let prev = path[path.length - 2];
                    pg.line(prev.x, prev.y, x, y);
                }
            } else {
                indicator.style.background = "orange";
                stateText.innerText = "偵測中 (請伸出食指)";
                if (isDrawing && path.length > 5) analyzeShape();
                isDrawing = false;
            }

            // 畫出目前的指尖位置 (白色圓點)
            fill(255);
            noStroke();
            ellipse(x, y, 15, 15);
        }
    }

    function analyzeShape() {
        document.getElementById('res').innerText = "分析完成！";
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); pg.resizeCanvas(width, height); }
</script>
</body>
</html>
