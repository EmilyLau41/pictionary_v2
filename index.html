<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>AI 幾何辨識 - 進階圖案版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            background: #121212;
            overflow: hidden;
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
        }

        #input_video {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.15;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(25, 25, 25, 0.9);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: white;
            min-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #res {
            font-size: 36px;
            color: #00ffcc;
            font-weight: 800;
            display: block;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .status-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
        }

        button {
            background: linear-gradient(135deg, #00ffcc, #00aba9);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            color: #121212;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }

        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <img id="input_video" autoplay playsinline></img>
    <div class="ui">
        <div class="status-box">
            <div id="indicator"></div>
            <span id="state_text">等待相機權限...</span>
        </div>
        <span>辨識結果：</span>
        <span id="res">---</span>
        <button onclick="startCapture()">啟動螢幕 / 相機擷取</button>
        <div class="hint">
            • <b>繪製：</b>伸出食指 (其他手指收起)<br>
            • <b>停止/辨識：</b>張開手掌 (五指伸展)<br>
            • <b>支援：</b>直線、圓形、正方形、三角形、愛心
        </div>
    </div>

    <script>
        let hands, pg, path = [], handResults = null, isDrawing = false;
        const imgElement = document.getElementById('input_video');

        function setup() {
            createCanvas(windowWidth, windowHeight);
            pg = createGraphics(windowWidth, windowHeight);
            pg.stroke(0, 255, 204);
            pg.strokeWeight(8);
            pg.strokeCap(ROUND);
            pg.strokeJoin(ROUND);

            hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.7 });
            hands.onResults(r => handResults = r.multiHandLandmarks);
        }

        // 前端修正
        async function startCapture() {
            // 不再需要 navigator.mediaDevices.getUserMedia
            // 直接將 proxy URL 設定給 video 標籤
            imgElement.crossOrigin = "anonymous"; // 避免畫布污染 (Canvas Tainting)
            imgElement.src = "http://localhost:3000/video_feed";

            imgElement.onload = () => {
                const loop = async () => {
                    if (!imgElement.paused) await hands.send({ image: imgElement });
                    requestAnimationFrame(loop);
                };
                loop();
            };
        }

        function draw() {
            clear();
            image(pg, 0, 0);

            if (handResults && handResults.length > 0) {
                let pts = handResults[0];
                let x = (1 - pts[8].x) * width;
                let y = pts[8].y * height;

                // --- 核心修改：手勢判斷邏輯 ---
                
                // 1. 食指伸直 (繪製模式)：食指尖(8) 高於 食指根(6)，且中指尖(12) 低於 中指根(10) [代表只有食指伸出]
                let isPointing = pts[8].y < pts[6].y && pts[12].y > pts[10].y;

                // 2. 五指伸開 (停止/辨識模式)：大拇指到小拇指的尖端都處於伸展狀態
                // 簡化判斷：食指(8)、中指(12)、無名指(16)、小指(20) 的 y 座標都小於其對應的第二關節
                let isFiveFingers = pts[8].y < pts[6].y && 
                                    pts[12].y < pts[10].y && 
                                    pts[16].y < pts[14].y && 
                                    pts[20].y < pts[18].y;

                const indicator = document.getElementById('indicator');
                const stateText = document.getElementById('state_text');

                if (isPointing) {
                    // 進入繪製狀態
                    indicator.style.background = "#00ffcc";
                    indicator.style.boxShadow = "0 0 10px #00ffcc";
                    stateText.innerText = "正在錄製軌跡...";

                    if (!isDrawing) { 
                        path = []; 
                        pg.clear(); 
                        isDrawing = true; 
                    }

                    if (path.length > 0) {
                        let lastP = path[path.length - 1];
                        x = lerp(lastP.x, x, 0.2);
                        y = lerp(lastP.y, y, 0.2);
                    }

                    path.push({ x, y });
                    if (path.length > 1) {
                        let p = path[path.length - 2];
                        pg.line(p.x, p.y, x, y);
                    }
                } 
                else if (isFiveFingers) {
                    // 偵測到五指伸出：觸發辨識並停止繪製
                    indicator.style.background = "#ff4444";
                    indicator.style.boxShadow = "0 0 10px #ff4444";
                    stateText.innerText = "偵測到辨識手勢！";

                    if (isDrawing && path.length > 15) {
                        analyzeShape(path);
                    }
                    isDrawing = false;
                }
                else {
                    // 其他手勢 (如握拳)：靜止狀態
                    indicator.style.background = "orange";
                    indicator.style.boxShadow = "0 0 10px orange";
                    stateText.innerText = "等待指令 (食指繪製 / 五指辨識)";
                    isDrawing = false; 
                }

                // 繪製指尖游標
                fill(255);
                noStroke();
                ellipse(x, y, 12, 12);
                noFill();
                stroke(0, 255, 204);
                ellipse(x, y, 20, 20);
            }
        }
        function analyzeShape(pts) {
    if (pts.length < 20) return; // 增加點數門檻確保資料量充足

    let xs = pts.map(p => p.x), ys = pts.map(p => p.y);
    let minX = Math.min(...xs), maxX = Math.max(...xs);
    let minY = Math.min(...ys), maxY = Math.max(...ys);
    let w = maxX - minX, h = maxY - minY;
    let centerX = (minX + maxX) / 2;
    let centerY = (minY + maxY) / 2;

    // --- 1. 計算閉合度與路徑平滑 ---
    let pathLength = 0;
    for (let i = 1; i < pts.length; i++) pathLength += dist(pts[i - 1].x, pts[i - 1].y, pts[i].x, pts[i].y);
    let isClosed = dist(pts[0].x, pts[0].y, pts[pts.length-1].x, pts[pts.length-1].y) < (pathLength * 0.35);

    // --- 2. 圓形基礎指標 (變異係數) ---
    let radii = pts.map(p => dist(p.x, p.y, centerX, centerY));
    let avgRadius = radii.reduce((a, b) => a + b) / radii.length;
    let varCoeff = Math.sqrt(radii.reduce((a, b) => a + Math.pow(b - avgRadius, 2), 0) / radii.length) / avgRadius;

    let guess = "🎨 自由曲線";

    if (isClosed) {
        // --- 3. 深度特徵提取 (專攻愛心) ---
        // 抓取上方 30% 區域的點
        let topPoints = pts.filter(p => p.y < minY + h * 0.3);
        
        // 分別找出 左側高峰、中心凹陷、右側高峰
        let leftLobe = topPoints.filter(p => p.x < centerX - w * 0.1);
        let rightLobe = topPoints.filter(p => p.x > centerX + w * 0.1);
        let centerCleft = topPoints.filter(p => Math.abs(p.x - centerX) < w * 0.1);

        let lobeY = minY; // 預設最高點
        if (leftLobe.length > 0 && rightLobe.length > 0) {
            lobeY = (Math.min(...leftLobe.map(p => p.y)) + Math.min(...rightLobe.map(p => p.y))) / 2;
        }
        
        let cleftY = centerCleft.length > 0 ? Math.min(...centerCleft.map(p => p.y)) : minY;

        // 計算 V 字型特徵：cleftY 越「大」代表越往下凹
        // 愛心判定條件：凹陷深度 > 總高度的 7% 且 變異係數較大
        let heartScore = cleftY - lobeY;
        let isHeart = heartScore > (h * 0.07);

        // --- 4. 決策優先級 ---
        if (isHeart) {
            guess = "❤️ 愛心 (Heart)";
        } 
        else if (varCoeff < 0.15) { 
            // 圓形判定：如果沒凹陷且半徑很平均
            guess = "⚪ 圓形 (Circle)";
        } 
        else {
            // --- 5. 其他形狀 (三角形/方形) ---
            let topIndex = ys.indexOf(minY);
            let isTopMid = Math.abs(pts[topIndex].x - centerX) < w * 0.15;
            let bottomPoints = pts.filter(p => p.y > maxY - h * 0.15);
            let bottomW = bottomPoints.length > 0 ? (Math.max(...bottomPoints.map(p => p.x)) - Math.min(...bottomPoints.map(p => p.x))) : 0;

            if (isTopMid && bottomW > w * 0.7) {
                guess = "🔺 三角形 (Triangle)";
            } else if (w/h > 0.7 && w/h < 1.3) {
                guess = "⬜ 正方形 (Square)";
            } else {
                guess = "📦 矩形 (Rectangle)";
            }
        }
    } else if (w/h > 5 || h/w > 5) {
        guess = "📏 直線 (Line)";
    }
    document.getElementById('res').innerText = guess;
}
    
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            let newPg = createGraphics(windowWidth, windowHeight);
            newPg.image(pg, 0, 0);
            pg = newPg;
        }
    </script>
</body>

</html>
